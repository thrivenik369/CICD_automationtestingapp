name: Python CI

#Trigger the workflow on any push to the main branch or pull request

on:
  push:
    branches:
        - main
  pull_request:
    branches:
      - main
      # stagging
      # dev
      # production
jobs:
  test:
    runs-on: ubuntu-latest   # git actions provides container on windows or mac -05 as well

    steps:
      # Step 1: check out the code from the repository
      - name: Check out code
        uses: actions/checkout@v2    #prebuild action by gitaction 
     
      # step 2: Set up python environment
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'
      
      # step 3: upgrade & Install dependencies
      - name: upgrade dependencies
        run:
         python -m pip install --upgrade pip
      - name: Install dependencies
        run:
         python -m pip install -r requirements.txt
      # step 4: Run tests
      - name: Run tests
        run: pytest 